<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ReadWise Offline — саммари книг с оффлайн-режимом">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ReadWise">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ReadWise Offline</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    // Capture PWA install prompt
    let _deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      _deferredInstallPrompt = e;
    });

    // Expose install prompt for Flutter
    window._pwaInstallPrompt = function() {
      if (_deferredInstallPrompt) {
        _deferredInstallPrompt.prompt();
        _deferredInstallPrompt = null;
        return true;
      }
      return false;
    };

    window._pwaCanInstall = function() {
      return _deferredInstallPrompt != null;
    };

    window.addEventListener('load', function(ev) {
      // Register custom service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js').then(function(reg) {
          console.log('Service Worker registered:', reg.scope);
        }).catch(function(err) {
          console.warn('Service Worker registration failed:', err);
        });
      }

      // Load Flutter (modern API)
      _flutter.loader.load();
    });
  </script>
</body>
</html>
